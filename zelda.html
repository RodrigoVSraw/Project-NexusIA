<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guia Hylian - N64</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="css/zelda.css">
</head>
<body>

  <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Voltar ao Nexus</a>

  <header class="main-banner">
    <h1 class="brand-main">
      <svg class="triforce-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <polygon points="12,2 18,12 6,12" />
        <polygon points="6,12 12,22 0,22" />
        <polygon points="18,12 24,22 12,22" />
      </svg>
      NAVI BOT
    </h1>
  </header>

  <main class="chat-wrapper">
    <div class="chat-container">
      <div class="chat-messages" id="chat-messages">
        <div class="message-wrapper bot">
          <img src="Imgs/OoT3D_Navi_Render.png" alt="Navi" class="avatar">
          <div class="message bot">HEY! LISTEN! Eu sou a Navi, seu guia de bolso. Pergunte sobre itens, objetivos, ou dicas!</div>
        </div>
      </div>
      <div class="chat-input-area">
        <input type="text" id="user-input" placeholder="Digite sua pergunta aqui..." autocomplete="off">
        <button id="send-btn"><i class="fas fa-play"></i></button>
      </div>
    </div>
  </main>
  <script src="js/zelda.js"></script>
</body>
</html>
