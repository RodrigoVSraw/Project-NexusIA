<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Santuário da Graça - Melina</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/eldenring.css">
</head>
<body>

    <video class="video-bg" autoplay loop muted playsinline>
        <source src="Imgs/bg_eldenring.mp4" type="video/mp4">
    </video>

    <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Voltar ao Nexus</a>

    <div class="chat-container">
        <div class="app-header">
            <img src="Imgs/melina.png" alt="Melina" class="avatar" onerror="this.src='https://via.placeholder.com/70/1a1a1a/c5a867?text=M'">
            <div class="contact-info">
                <span class="contact-name">Melina</span>
                <span class="contact-status">Aguardando no Local da Graça...</span>
            </div>
        </div>

        <div class="chat-messages" id="chat-messages">
            <div class="bubble-wrapper bot">
                <span class="bubble-sender">Melina</span>
                <div class="bubble">
                    Saudações, Maculado. Eu ofereço-te um acordo. Agirei como a tua donzela, transformando runas em força. O que desejas saber?
                </div>
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="Fale com a Donzela..." autocomplete="off">
            <button class="send-btn" id="send-btn"><i class="fas fa-feather-alt"></i></button>
        </div>
    </div>
  <script src="js/eldenring.js"></script>
</body>
</html>
